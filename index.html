<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0"><link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-180.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="EchoPrep">
<meta name="theme-color" content="#1e293b">
<title>EchoPrep</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&family=Fraunces:wght@400;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<style>
:root {
  --p:#6366f1;--p-h:#4f46e5;--bg:#f8fafc;--c-bg:#ffffff;--t-p:#1e293b;--t-s:#64748b;--bor:#e2e8f0;--sh:0 4px 6px -1px rgba(0,0,0,0.1),0 2px 4px -1px rgba(0,0,0,0.06);--r:16px;
}
* {box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
body {font-family:'Plus Jakarta Sans',sans-serif;background:var(--bg);color:var(--t-p);line-height:1.5;overflow-x:hidden;}
.fraunces {font-family:'Fraunces',serif;}
.mono {font-family:'JetBrains Mono',monospace;}

/* Auth Screen */
#auth {position:fixed;inset:0;background:var(--bg);z-index:2000;display:flex;align-items:center;justify-content:center;padding:20px;}
.ac {background:var(--c-bg);padding:40px;border-radius:24px;width:100%;max-width:400px;box-shadow:var(--sh);text-align:center;}
.ac h1 {font-size:2rem;margin-bottom:8px;background:linear-gradient(135deg,#6366f1,#8b5cf6);-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
.ac p {color:var(--t-s);margin-bottom:32px;font-size:0.95rem;}
.af {display:flex;flex-direction:column;gap:16px;}
.af input {padding:14px 18px;border:2px solid var(--bor);border-radius:12px;font-size:1rem;transition:0.2s;outline:none;}
.af input:focus {border-color:var(--p);box-shadow:0 0 0 4px rgba(99,102,241,0.1);}
.ab {background:var(--p);color:white;padding:14px;border:none;border-radius:12px;font-weight:600;font-size:1rem;cursor:pointer;transition:0.2s;margin-top:8px;}
.ab:hover {background:var(--p-h);transform:translateY(-1px);}
#atog {margin-top:24px;font-size:0.9rem;color:var(--t-s);}
#atog a {color:var(--p);text-decoration:none;font-weight:600;cursor:pointer;}
#aerr {color:#ef4444;font-size:0.85rem;margin-top:16px;min-height:1.2em;}

/* Layout */
#app {display:none;min-height:100vh;flex-direction:column;}
.nav {position:sticky;top:0;background:rgba(255,255,255,0.8);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);border-bottom:1px solid var(--bor);z-index:1000;padding:0 20px;}
.nc {max-width:1000px;margin:0 auto;height:72px;display:flex;align-items:center;justify-content:space-between;}
.logo {font-family:'Fraunces',serif;font-size:1.5rem;font-weight:600;color:var(--p);text-decoration:none;display:flex;align-items:center;gap:8px;}
.user-m {display:flex;align-items:center;gap:16px;}
#u-email {font-size:0.9rem;color:var(--t-s);font-weight:500;}
.lo-b {background:transparent;border:1.5px solid var(--bor);padding:8px 16px;border-radius:10px;font-size:0.85rem;font-weight:600;cursor:pointer;transition:0.2s;color:var(--t-s);}
.lo-b:hover {background:#fee2e2;border-color:#fecaca;color:#ef4444;}

.main {flex:1;max-width:1000px;margin:0 auto;padding:32px 20px;width:100%;}
.grid {display:grid;grid-template-columns:1fr 340px;gap:32px;}

/* Form Card */
.card {background:var(--c-bg);border-radius:var(--r);padding:28px;box-shadow:var(--sh);border:1px solid var(--bor);}
.card h2 {font-size:1.25rem;margin-bottom:20px;display:flex;align-items:center;gap:10px;}
.inp-g {margin-bottom:20px;}
.inp-g label {display:block;font-size:0.85rem;font-weight:600;color:var(--t-s);margin-bottom:8px;text-transform:uppercase;letter-spacing:0.05em;}
textarea {width:100%;padding:16px;border:2px solid var(--bor);border-radius:12px;font-size:1rem;font-family:inherit;resize:none;min-height:120px;outline:none;transition:0.2s;}
textarea:focus {border-color:var(--p);box-shadow:0 0 0 4px rgba(99,102,241,0.1);}
.b-p {width:100%;background:var(--p);color:white;padding:16px;border:none;border-radius:12px;font-weight:600;font-size:1.1rem;cursor:pointer;transition:0.2s;display:flex;align-items:center;justify-content:center;gap:10px;}
.b-p:hover {background:var(--p-h);transform:translateY(-2px);box-shadow:0 10px 15px -3px rgba(99,102,241,0.3);}
.b-p:disabled {opacity:0.7;cursor:not-allowed;transform:none;box-shadow:none;}

/* Sidebar */
.stats-c {display:flex;flex-direction:column;gap:24px;}
.stat-i {background:var(--c-bg);padding:24px;border-radius:var(--r);box-shadow:var(--sh);border:1px solid var(--bor);}
.stat-i h3 {font-size:0.85rem;color:var(--t-s);text-transform:uppercase;margin-bottom:12px;letter-spacing:0.05em;}
.stat-v {font-size:2rem;font-weight:700;color:var(--t-p);}
.stat-v span {font-size:1rem;color:var(--t-s);font-weight:500;margin-left:4px;}

/* Results */
.res-w {margin-top:40px;display:none;animation:fadeUp 0.5s ease-out;}
@keyframes fadeUp {from {opacity:0;transform:translateY(20px);} to {opacity:1;transform:translateY(0);}}
.res-g {display:grid;grid-template-columns:1fr 1fr;gap:24px;margin-bottom:32px;}
.fb-c {background:var(--c-bg);border-radius:var(--r);padding:24px;border:1px solid var(--bor);position:relative;overflow:hidden;}
.fb-c::before {content:'';position:absolute;top:0;left:0;width:4px;height:100%;background:var(--p);}
.fb-q {font-weight:700;margin-bottom:12px;font-size:1.1rem;}
.fb-a {color:var(--t-s);font-size:1rem;}
.fb-e {margin-top:16px;padding:16px;background:var(--bg);border-radius:12px;font-size:0.95rem;}
.fb-e strong {color:var(--p);display:block;margin-bottom:4px;}

/* History */
.hist-h {display:flex;align-items:center;justify-content:space-between;margin:48px 0 24px;}
.hist-l {display:flex;flex-direction:column;gap:16px;}
.hist-i {background:var(--c-bg);padding:20px;border-radius:var(--r);border:1px solid var(--bor);display:flex;justify-content:space-between;align-items:center;cursor:pointer;transition:0.2s;}
.hist-i:hover {border-color:var(--p);transform:translateX(4px);}
.hist-t {font-weight:600;font-size:1.05rem;}
.hist-d {font-size:0.85rem;color:var(--t-s);margin-top:4px;}
.hist-s {background:#e0e7ff;color:var(--p);padding:4px 12px;border-radius:20px;font-size:0.85rem;font-weight:700;}

/* Toast & Loading */
.toast {position:fixed;bottom:32px;left:50%;transform:translateX(-50%) translateY(100px);background:#1e293b;color:white;padding:12px 24px;border-radius:12px;font-weight:500;transition:0.3s cubic-bezier(0.4,0,0.2,1);z-index:3000;box-shadow:0 20px 25px -5px rgba(0,0,0,0.1);}
.toast.show {transform:translateX(-50%) translateY(0);}
.ldc {display:flex;flex-direction:column;align-items:center;gap:16px;padding:40px;}
.dots {display:flex;gap:8px;}
.dots span {width:10px;height:10px;background:var(--p);border-radius:50%;animation:dot 1.4s infinite ease-in-out both;}
.dots span:nth-child(1) {animation-delay:-0.32s;}
.dots span:nth-child(2) {animation-delay:-0.16s;}
@keyframes dot {0%,80%,100% {transform:scale(0);} 40% {transform:scale(1);}}

@media (max-width:850px) {
  .grid {grid-template-columns:1fr;}
  .res-g {grid-template-columns:1fr;}
  .nc {height:64px;}
  .user-m span {display:none;}
}
</style>
</head>
<body>

<div id="auth">
  <div class="ac">
    <h1 class="fraunces">EchoPrep</h1>
    <p>Master your interviews with AI</p>
    <div class="af">
      <input type="email" id="aemail" placeholder="Email address">
      <input type="password" id="apass" placeholder="Password">
      <div id="nwrap" style="display:none">
        <input type="text" id="aname" placeholder="Full name" style="width:100%;margin-top:16px">
      </div>
      <button class="ab" id="abtn" onclick="doAuth()">Sign In</button>
    </div>
    <div id="aerr"></div>
    <div id="atog">New user? <a onclick="toggleAuth()">Create account</a></div>
  </div>
</div>

<div id="app">
  <nav class="nav">
    <div class="nc">
      <a href="#" class="logo">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M12 2a3 3 0 0 0-3 3v7a3 3 0 0 0 6 0V5a3 3 0 0 0-3-3Z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" x2="12" y1="19" y2="22"/></svg>
        EchoPrep
      </a>
      <div class="user-m">
        <span id="u-email"></span>
        <button class="lo-b" onclick="firebase.auth().signOut()">Sign Out</button>
      </div>
    </div>
  </nav>

  <main class="main">
    <div class="grid">
      <div class="card-w">
        <div class="card">
          <h2 class="fraunces">Practice Session</h2>
          <div class="inp-g">
            <label>Interview Context</label>
            <textarea id="ctx" placeholder="e.g. Senior Frontend Engineer at Google, focusing on React and System Design..." oninput="ar(this)"></textarea>
          </div>
          <div class="inp-g">
            <label>Question</label>
            <textarea id="ques" placeholder="What is the question you're practicing?" oninput="ar(this)"></textarea>
          </div>
          <div class="inp-g">
            <label>Your Response</label>
            <textarea id="ans" placeholder="Type or paste your answer here..." style="min-height:200px" oninput="ar(this)"></textarea>
          </div>
          <button class="b-p" id="pbtn" onclick="analyze()">
            <span id="pbtn-t">Analyze Response</span>
          </button>
        </div>
      </div>

      <div class="stats-c">
        <div class="stat-i">
          <h3>Average Score</h3>
          <div class="stat-v" id="avg-s">0<span>%</span></div>
          <canvas id="scoreChart" style="margin-top:20px;height:100px"></canvas>
        </div>
        <div class="stat-i">
          <h3>Total Sessions</h3>
          <div class="stat-v" id="tot-s">0</div>
        </div>
      </div>
    </div>

    <div id="res" class="res-w">
      </div>

    <div class="hist-h">
      <h2 class="fraunces">Past Sessions</h2>
    </div>
    <div id="hist" class="hist-l">
      </div>
  </main>
</div>

<div id="toast" class="toast"></div>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyAs-REPLACEME",
  authDomain: "echoprep-ai.firebaseapp.com",
  projectId: "echoprep-ai",
  storageBucket: "echoprep-ai.appspot.com",
  messagingSenderId: "123456789",
  appId: "1:123456789:web:abcdef"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();
let user = null;
let chart = null;

firebase.auth().onAuthStateChanged(u => {
  user = u;
  if (u) {
    document.getElementById('auth').style.display = 'none';
    document.getElementById('app').style.display = 'flex';
    document.getElementById('u-email').textContent = u.email;
    loadData();
  } else {
    document.getElementById('auth').style.display = 'flex';
    document.getElementById('app').style.display = 'none';
  }
});

let isL = true;
function toggleAuth() {isL = !isL;document.getElementById('nwrap').style.display = isL ? 'none' : 'block';document.getElementById('abtn').textContent = isL ? 'Sign In' : 'Create Account';document.getElementById('atog').innerHTML = isL ? 'New user? <a onclick=\"toggleAuth()\">Create account</a>' : 'Have account? <a onclick=\"toggleAuth()\">Sign in</a>';}

async function doAuth() {
  const e = document.getElementById('aemail').value;const p = document.getElementById('apass').value;
  const err = document.getElementById('aerr');err.textContent = '';
  try {
    if (isL) await firebase.auth().signInWithEmailAndPassword(e, p);
    else await firebase.auth().createUserWithEmailAndPassword(e, p);
  } catch (ex) {err.textContent = ex.message.replace('Firebase: ', '');}
}

function ar(el) {el.style.height = 'auto';el.style.height = Math.min(el.scrollHeight, 100) + 'px';}
function toast(msg, type = '') {const t = document.getElementById('toast');t.textContent = msg;t.className = 'toast show' + (type ? ' ' + type : '');setTimeout(() => t.className = 'toast', 2500);}
function ldg(txt = '') {return `<div class="ldc"><div class="dots"><span></span><span></span><span></span></div><p style="color:var(--t-s);font-size:0.9rem">${txt}</p></div>`;}

async function analyze() {
  const ctx = document.getElementById('ctx').value;
  const ques = document.getElementById('ques').value;
  const ans = document.getElementById('ans').value;
  
  if (!ctx || !ques || !ans) return toast('Please fill in all fields');
  
  const btn = document.getElementById('pbtn');
  const btnT = document.getElementById('pbtn-t');
  const resD = document.getElementById('res');
  
  btn.disabled = true;
  btnT.textContent = 'Analyzing...';
  resD.style.display = 'block';
  resD.innerHTML = ldg('AI is evaluating your response...');
  resD.scrollIntoView({behavior:'smooth'});

  try {
    // Mock AI analysis for demo
    await new Promise(r => setTimeout(r, 2000));
    const mockRes = {
      score: Math.floor(Math.random() * 40) + 60,
      feedback: "Your explanation of the concept was clear, but could benefit from more specific technical examples. Try to use the STAR method.",
      strengths: ["Clear communication", "Good terminology"],
      improvements: ["Provide more data-driven results", "Explain the 'Why' more deeply"],
      ts: Date.now(),
      ctx, ques, ans
    };
    
    await db.collection('users').doc(user.uid).collection('sessions').add(mockRes);
    renderResults(mockRes);
    loadData();
    toast('Analysis complete!', 'success');
  } catch (ex) {
    toast('Error: ' + ex.message);
  } finally {
    btn.disabled = false;
    btnT.textContent = 'Analyze Response';
  }
}

function renderResults(d) {
  const resD = document.getElementById('res');
  resD.innerHTML = `
    <h2 class="fraunces" style="margin-bottom:24px">Analysis Result</h2>
    <div class="res-g">
      <div class="stat-i">
        <h3>Session Score</h3>
        <div class="stat-v" style="color:var(--p)">${d.score}<span>%</span></div>
      </div>
      <div class="fb-c">
        <div class="fb-q">AI Feedback</div>
        <div class="fb-a">${d.feedback}</div>
      </div>
    </div>
    <div class="res-g">
      <div class="fb-c" style="border-left:4px solid #10b981">
        <div class="fb-q" style="color:#10b981">Key Strengths</div>
        <ul style="margin-left:20px;color:var(--t-s)">
          ${d.strengths.map(s => `<li>${s}</li>`).join('')}
        </ul>
      </div>
      <div class="fb-c" style="border-left:4px solid #f59e0b">
        <div class="fb-q" style="color:#f59e0b">Areas to Improve</div>
        <ul style="margin-left:20px;color:var(--t-s)">
          ${d.improvements.map(s => `<li>${s}</li>`).join('')}
        </ul>
      </div>
    </div>
  `;
}

async function loadData() {
  const snap = await db.collection('users').doc(user.uid).collection('sessions').orderBy('ts', 'desc').limit(10).get();
  const sessions = [];
  snap.forEach(doc => sessions.push(doc.data()));
  
  if (sessions.length === 0) return;

  const avg = Math.round(sessions.reduce((a, b) => a + b.score, 0) / sessions.length);
  document.getElementById('avg-s').innerHTML = `${avg}<span>%</span>`;
  document.getElementById('tot-s').textContent = sessions.length;

  const histD = document.getElementById('hist');
  histD.innerHTML = sessions.map(s => `
    <div class="hist-i" onclick='renderResults(${JSON.stringify(s).replace(/'/g, "&apos;")})'>
      <div>
        <div class="hist-t">${s.ques.substring(0, 50)}${s.ques.length > 50 ? '...' : ''}</div>
        <div class="hist-d">${new Date(s.ts).toLocaleDateString()} • ${s.ctx.substring(0, 30)}...</div>
      </div>
      <div class="hist-s">${s.score}%</div>
    </div>
  `).join('');

  updateChart(sessions.reverse());
}

function updateChart(data) {
  const ctx = document.getElementById('scoreChart').getContext('2d');
  if (chart) chart.destroy();
  chart = new Chart(ctx, {
    type: 'line',
    data: {
      labels: data.map((_, i) => i + 1),
      datasets: [{
        label: 'Score',
        data: data.map(s => s.score),
        borderColor: '#6366f1',
        borderWidth: 3,
        tension: 0.4,
        pointRadius: 0,
        fill: true,
        backgroundColor: 'rgba(99, 102, 241, 0.1)'
      }]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      plugins: { legend: { display: false } },
      scales: {
        x: { display: false },
        y: { display: false, min: 0, max: 100 }
      }
    }
  });
}
</script>
</body>
</html>
